name: Desktop publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DESKTOP_DIR: dora-desktop

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read desktop version
        id: ver
        shell: bash
        run: |
          VERSION="$(node -p "JSON.parse(require('fs').readFileSync('${{ env.DESKTOP_DIR }}/src-tauri/tauri.conf.json','utf8')).version")"
          if [ -z "$VERSION" ]; then
            echo "No version in tauri.conf.json" >&2
            exit 2
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create or reuse GitHub Release (single)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.ver.outputs.version }}"
          # If release exists, do nothing. Otherwise create a draft release.
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists."
          else
            gh release create "$TAG" --draft --title "$TAG" --notes "See the assets to download this version and install."
          fi

  publish-tauri:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Configure Git for long paths (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          git config --global core.longpaths true
          Add-Content -Path $env:GITHUB_ENV -Value "EnableWin32LongPaths=1"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Linux dependencies (WebKitGTK)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: ${{ env.DESKTOP_DIR }}/pnpm-lock.yaml

      - name: Install frontend dependencies
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
        working-directory: ${{ env.DESKTOP_DIR }}
        run: pnpm install --frozen-lockfile

      - name: Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ${{ env.DESKTOP_DIR }}/src-tauri -> target
          key: ${{ matrix.platform }}-${{ matrix.args }}

      - name: Build and upload to GitHub Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: ${{ env.DESKTOP_DIR }}
          tauriScript: pnpm exec tauri
          tagName: ${{ needs.create-release.outputs.version }}
          releaseName: '${{ needs.create-release.outputs.version }}'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}
